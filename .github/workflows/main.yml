name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Run tests once on instance-1 only.
  # If this fails, the deploy job never runs.
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: [self-hosted, instance-1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install backend dependencies
        working-directory: ./backend
        run: yarn install --frozen-lockfile

      - name: Write .env for tests
        working-directory: ./backend
        run: echo "${{ secrets.PROD }}" > .env

      - name: Run backend tests
        working-directory: ./backend
        run: npm test

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to BOTH instances in parallel.
  # Only runs if the test job above passes.
  # This is what gives you load-balanced deploys.
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy → ${{ matrix.instance }}
    needs: test
    runs-on: [self-hosted, "${{ matrix.instance }}"]

    strategy:
      matrix:
        instance: [instance-1, instance-2]
      # If one instance deploy fails, still attempt the other.
      # Remove this line if you want an all-or-nothing deploy.
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install backend dependencies
        working-directory: ./backend
        run: yarn install --frozen-lockfile

      - name: Install frontend dependencies and build
        working-directory: ./frontend
        run: |
          rm -rf ./build
          yarn install --frozen-lockfile
          yarn build

      # Write the .env from a single GitHub secret called PROD.

      - name: Write .env
        working-directory: ./backend
        run: echo "${{ secrets.PROD }}" > .env

      - name: Deploy with PM2
        run: pm2 startOrRestart ecosystem.config.js --env production
